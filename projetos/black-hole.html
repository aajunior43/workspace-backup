<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulação: Buraco Negro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        canvas { display: block; }
        
        #panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.85);
            border: 1px solid rgba(255,140,0,0.4);
            border-radius: 12px;
            padding: 20px;
            min-width: 280px;
            color: #fff;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(255,100,0,0.2);
        }
        
        #panel h2 {
            color: #ff8c00;
            margin-bottom: 15px;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(255,140,0,0.5);
        }
        
        .info-group {
            margin-bottom: 12px;
        }
        
        .info-label {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .info-value {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
        }
        
        .info-value.highlight {
            color: #ff8c00;
            text-shadow: 0 0 8px rgba(255,140,0,0.6);
        }
        
        .divider {
            height: 1px;
            background: rgba(255,140,0,0.2);
            margin: 15px 0;
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.85);
            border: 1px solid rgba(255,140,0,0.4);
            border-radius: 12px;
            padding: 20px;
            color: #fff;
            backdrop-filter: blur(10px);
        }
        
        #controls label {
            display: block;
            margin-bottom: 8px;
            color: #888;
            font-size: 12px;
        }
        
        #massSlider {
            width: 250px;
            accent-color: #ff8c00;
        }
        
        #massValue {
            color: #ff8c00;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .btn-row {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        
        button {
            background: linear-gradient(135deg, #ff8c00, #ff4500);
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,140,0,0.5);
        }
        
        #title {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            text-align: right;
        }
        
        #title h1 {
            font-size: 24px;
            color: rgba(255,140,0,0.5);
            text-shadow: 0 0 20px rgba(255,100,0,0.3);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="panel">
        <h2>⬤ Buraco Negro</h2>
        
        <div class="info-group">
            <div class="info-label">Massa</div>
            <div class="info-value" id="mass">10 M☉</div>
        </div>
        
        <div class="info-group">
            <div class="info-label">Raio de Schwarzschild</div>
            <div class="info-value highlight" id="rs">29.5 km</div>
        </div>
        
        <div class="divider"></div>
        
        <div class="info-group">
            <div class="info-label">Temperatura Hawking</div>
            <div class="info-value" id="temp">6.2e-8 K</div>
        </div>
        
        <div class="info-group">
            <div class="info-label">Dilatação Temporal (r=3Rs)</div>
            <div class="info-value highlight" id="timeDilation">50%</div>
        </div>
        
        <div class="divider"></div>
        
        <div class="info-group">
            <div class="info-label">Velocidade Orbital (r=10Rs)</div>
            <div class="info-value" id="orbitalVel">12,600 km/s</div>
        </div>
        
        <div class="info-group">
            <div class="info-label">Força Maré (r=Rs)</div>
            <div class="info-value" id="tidalForce">8.7e10 g/m</div>
        </div>
        
        <div class="info-group">
            <div class="info-label">Espaguetificação</div>
            <div class="info-value highlight" id="spaghettification">1.8g/m</div>
        </div>
    </div>
    
    <div id="controls">
        <label>Massa: <span id="massValue">10</span> Massas Solares</label>
        <input type="range" id="massSlider" min="1" max="100" value="10">
        <div class="btn-row">
            <button onclick="resetSimulation()">Resetar</button>
            <button onclick="toggleParticles()">Partículas</button>
        </div>
    </div>
    
    <div id="title">
        <h1>Black Hole</h1>
        Simulação Interativa
    </div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, cx, cy;
        let mass = 10;
        let particles = [];
        let stars = [];
        let showParticles = true;
        let time = 0;
        
        const G = 6.674e-11;
        const c = 299792458;
        const M_sun = 1.989e30;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cx = width / 2;
            cy = height / 2;
            initStars();
        }
        
        function initStars() {
            stars = [];
            for (let i = 0; i < 400; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 0.5,
                    brightness: Math.random(),
                    twinkle: Math.random() * Math.PI * 2
                });
            }
        }
        
        function initParticles() {
            particles = [];
            for (let i = 0; i < 80; i++) {
                let angle = Math.random() * Math.PI * 2;
                let dist = 150 + Math.random() * 300;
                particles.push({
                    x: cx + Math.cos(angle) * dist,
                    y: cy + Math.sin(angle) * dist,
                    vx: 0,
                    vy: 0,
                    trail: [],
                    alive: true,
                    size: Math.random() * 3 + 1,
                    hue: Math.random() * 40 + 20
                });
            }
        }
        
        function getSchwarzschildRadius(m) {
            return (2 * G * m * M_sun) / (c * c);
        }
        
        function getHawkingTemp(m) {
            return (6.17e-8) / m;
        }
        
        function getTimeDilation(r, rs) {
            return Math.sqrt(1 - rs / r);
        }
        
        function getOrbitalVelocity(m, r) {
            return Math.sqrt(G * m * M_sun / r);
        }
        
        function getTidalForce(m, r) {
            let rs = getSchwarzschildRadius(m);
            let r_m = r * 1000;
            return (2 * G * m * M_sun) / (r_m * r_m * r_m) * 100;
        }
        
        function updatePanel() {
            let rs = getSchwarzschildRadius(mass) / 1000;
            let temp = getHawkingTemp(mass);
            let td = getTimeDilation(3 * rs, rs);
            let orbVel = getOrbitalVelocity(mass, 10 * rs * 1000) / 1000;
            let tidal = getTidalForce(mass, rs);
            let spagh = tidal * rs * 1000;
            
            document.getElementById('mass').textContent = mass + ' M☉';
            document.getElementById('rs').textContent = rs.toFixed(1) + ' km';
            document.getElementById('temp').textContent = temp.toExponential(1) + ' K';
            document.getElementById('timeDilation').textContent = (td * 100).toFixed(0) + '%';
            document.getElementById('orbitalVel').textContent = orbVel.toFixed(0) + ' km/s';
            document.getElementById('tidalForce').textContent = tidal.toExponential(1) + ' g/m';
            document.getElementById('spaghettification').textContent = spagh.toFixed(1) + ' g/m';
        }
        
        function drawStars() {
            stars.forEach(star => {
                let twinkle = 0.5 + 0.5 * Math.sin(star.twinkle + time * 2);
                let alpha = star.brightness * twinkle;
                
                let dx = star.x - cx;
                let dy = star.y - cy;
                let dist = Math.sqrt(dx * dx + dy * dy);
                let rsPixels = mass * 3;
                
                if (dist < rsPixels * 3) {
                    let factor = rsPixels / (dist + 1);
                    let newX = cx + dx * factor;
                    let newY = cy + dy * factor;
                    ctx.beginPath();
                    ctx.arc(newX, newY, star.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 250, 240, ${alpha})`;
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 250, 240, ${alpha})`;
                    ctx.fill();
                }
            });
        }
        
        function drawBlackHole() {
            let rsPixels = mass * 3;
            
            let gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, rsPixels * 4);
            gradient.addColorStop(0, 'rgba(0,0,0,1)');
            gradient.addColorStop(0.3, 'rgba(0,0,0,1)');
            gradient.addColorStop(0.6, 'rgba(20,5,0,0.8)');
            gradient.addColorStop(0.8, 'rgba(255,100,0,0.4)');
            gradient.addColorStop(1, 'rgba(255,50,0,0)');
            
            ctx.beginPath();
            ctx.arc(cx, cy, rsPixels * 4, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            let photonRing = ctx.createRadialGradient(cx, cy, rsPixels * 0.95, cx, cy, rsPixels * 1.3);
            photonRing.addColorStop(0, 'rgba(255,150,50,0)');
            photonRing.addColorStop(0.5, 'rgba(255,200,100,0.8)');
            photonRing.addColorStop(1, 'rgba(255,100,0,0)');
            
            ctx.beginPath();
            ctx.arc(cx, cy, rsPixels * 1.3, 0, Math.PI * 2);
            ctx.fillStyle = photonRing;
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(cx, cy, rsPixels, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
            
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.arc(cx, cy, rsPixels + i * 2, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255,150,50,${0.15 - i * 0.025})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
        
        function drawAccretionDisk() {
            let rsPixels = mass * 3;
            let diskRadius = rsPixels * 2.5;
            
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(time * 0.3);
            
            for (let i = 0; i < 360; i += 5) {
                let angle = (i * Math.PI) / 180;
                let innerR = rsPixels * 1.2;
                let outerR = diskRadius;
                let r = innerR + (outerR - innerR) * Math.random();
                
                let x = Math.cos(angle) * r;
                let y = Math.sin(angle) * r * 0.3;
                
                let hue = 20 + Math.sin(angle + time) * 20;
                let brightness = 0.5 + Math.random() * 0.5;
                
                ctx.beginPath();
                ctx.arc(x, y, 2 + Math.random() * 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, 100%, ${brightness * 50}%, ${brightness})`;
                ctx.fill();
            }
            
            let glowGradient = ctx.createRadialGradient(0, 0, innerR, 0, 0, outerR);
            glowGradient.addColorStop(0, 'rgba(255,100,0,0.6)');
            glowGradient.addColorStop(0.5, 'rgba(255,50,0,0.3)');
            glowGradient.addColorStop(1, 'rgba(255,0,0,0)');
            
            ctx.beginPath();
            ctx.ellipse(0, 0, diskRadius, diskRadius * 0.3, 0, 0, Math.PI * 2);
            ctx.fillStyle = glowGradient;
            ctx.fill();
            
            ctx.restore();
        }
        
        function updateParticles() {
            if (!showParticles) return;
            
            particles.forEach(p => {
                if (!p.alive) return;
                
                let dx = cx - p.x;
                let dy = cy - p.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < mass * 2) {
                    p.alive = false;
                    return;
                }
                
                let force = (mass * 500) / (dist * dist);
                let ax = (dx / dist) * force;
                let ay = (dy / dist) * force;
                
                p.vx += ax;
                p.vy += ay;
                p.x += p.vx;
                p.y += p.vy;
                
                p.trail.push({ x: p.x, y: p.y });
                if (p.trail.length > 20) p.trail.shift();
            });
            
            let aliveCount = particles.filter(p => p.alive).length;
            if (aliveCount < 20) {
                let angle = Math.random() * Math.PI * 2;
                let dist = 200 + Math.random() * 200;
                particles.push({
                    x: cx + Math.cos(angle) * dist,
                    y: cy + Math.sin(angle) * dist,
                    vx: 0,
                    vy: 0,
                    trail: [],
                    alive: true,
                    size: Math.random() * 3 + 1,
                    hue: Math.random() * 40 + 20
                });
            }
        }
        
        function drawParticles() {
            if (!showParticles) return;
            
            particles.forEach(p => {
                if (!p.alive || p.trail.length < 2) return;
                
                ctx.beginPath();
                ctx.moveTo(p.trail[0].x, p.trail[0].y);
                for (let i = 1; i < p.trail.length; i++) {
                    ctx.lineTo(p.trail[i].x, p.trail[i].y);
                }
                ctx.strokeStyle = `hsla(${p.hue}, 100%, 60%, 0.5)`;
                ctx.lineWidth = p.size * 0.5;
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 100%, 70%, 1)`;
                ctx.fill();
            });
        }
        
        function draw() {
            ctx.fillStyle = '#000005';
            ctx.fillRect(0, 0, width, height);
            
            drawStars();
            drawAccretionDisk();
            drawBlackHole();
            drawParticles();
        }
        
        function animate() {
            time += 0.016;
            updateParticles();
            draw();
            requestAnimationFrame(animate);
        }
        
        function resetSimulation() {
            initParticles();
            updatePanel();
        }
        
        function toggleParticles() {
            showParticles = !showParticles;
            if (showParticles && particles.length === 0) {
                initParticles();
            }
        }
        
        document.getElementById('massSlider').addEventListener('input', (e) => {
            mass = parseInt(e.target.value);
            document.getElementById('massValue').textContent = mass;
            updatePanel();
        });
        
        window.addEventListener('resize', resize);
        
        resize();
        initParticles();
        updatePanel();
        animate();
    </script>
</body>
</html>
